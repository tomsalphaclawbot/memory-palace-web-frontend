services:
  memory-palace-web-frontend:
    build: .
    container_name: memory-palace-web-frontend
    restart: unless-stopped
    environment:
      APP_CONFIG_FILE: /app/config/palace.json
      HOST: 0.0.0.0
      PORT: 8099
      GUNICORN_CMD_ARGS: ${GUNICORN_CMD_ARGS:---reload}
    volumes:
      - ${PALACE_PATH:-./palace}:/app/palace:ro
      - ./app.py:/app/app.py:ro
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PORT:-8099}:8099"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8099/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared-memory-palace-web-frontend:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-memory-palace-web-frontend
    restart: unless-stopped
    depends_on:
      memory-palace-web-frontend:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:-}
    profiles: ["tunnel"]
