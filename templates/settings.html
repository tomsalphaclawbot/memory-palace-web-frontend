<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Memory Palace Settings</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">▮</span>
          <span>Memory Palace</span>
        </div>

        <nav class="side-nav" aria-label="View tabs">
          <a class="nav-item link-nav" href="/">Browser</a>
          <a class="nav-item link-nav" href="/#graph">Graph</a>
          <a class="nav-item link-nav" href="/#view3d">3D</a>
          <a class="nav-item link-nav active" aria-current="page" href="/settings">Settings</a>
        </nav>

        <div class="sidebar-dot" aria-hidden="true"></div>
      </aside>

      <main class="workspace">
        <section class="panel-card settings-panel">
          <h1>Settings</h1>
          <p class="muted">Configure palace path for this browser session.</p>
          <p class="notice">
            Docker setups may hard-wire <code>MEMORY_PALACE_PATH</code>. In that case this override can be unnecessary.
          </p>

          <label>
            Palace path
            <input id="settingsPalaceInput" type="text" placeholder="/path/to/palace or /path/to/chroma.sqlite3" />
          </label>

          <div class="action-row">
            <button id="settingsLoadDefault">Load API default</button>
            <button id="settingsValidate">Validate path</button>
            <button id="settingsOpenBrowser">Open Browser</button>
          </div>

          <div id="settingsStatus" class="status"></div>
        </section>
      </main>
    </div>

    <script src="/static/settings.js"></script>
  </body>
</html>
